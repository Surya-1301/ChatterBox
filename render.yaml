
services:
  - type: web
    name: chatterbox
    env: node
    plan: free
    # Use npm ci in CI/Render for reproducible installs and then build
    buildCommand: "npm ci && npm run build"
    # next start reads the PORT env var provided by Render. Keep npm start.
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: chatterbox
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://chatterbox-qd15.onrender.com/api/auth/google/callback
      - key: NEXT_PUBLIC_APP_URL
        value: https://chatterbox-qd15.onrender.com
      - key: EMAILJS_SERVICE_ID
        sync: false
      - key: EMAILJS_PUBLIC_KEY
        sync: false
      - key: EMAILJS_PRIVATE_KEY
        sync: false
      - key: EMAILJS_RESET_TEMPLATE_ID
        value: template_ovxq7jl
      - key: GEMINI_API_KEY
        sync: false
